<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https://wa.me https://api.whatsapp.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';">
    <title>Loader - Benito Juárez & Primavera - Sinergia REA</title>
    <link rel="stylesheet" href="assets/loader.css">
</head>
<body>
    <!-- Loader optimizado para Marzo: Benito Juárez & Primavera -->
    <div class="valentine-loader march-loader" id="valentineLoader">
        <div class="loader-particles" id="particlesContainer"></div>
        <div class="floating-elements" id="elementsContainer"></div>
        <div class="loader-content">
            <div class="heart-spinner">
                <div class="heart-center">
                    <!-- Medallón de Benito Juárez con Primavera -->
                    <div class="march-medallion" role="img" aria-label="Benito Juárez y Primavera">
                        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                            <!-- Marco dorado -->
                            <circle cx="100" cy="100" r="95" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.8"/>
                            <circle cx="100" cy="100" r="90" fill="none" stroke="#daa520" stroke-width="1.5"/>
                            
                            <!-- Fondo de primavera -->
                            <defs>
                                <linearGradient id="springGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#e8f5e9;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#fff9e6;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <circle cx="100" cy="100" r="88" fill="url(#springGrad)"/>
                            
                            <!-- Flores esquinas (cerezo) -->
                            <g id="flower-tl">
                                <circle cx="25" cy="25" r="3" fill="#ff69b4"/>
                                <circle cx="20" cy="22" r="2.5" fill="#ff1493"/>
                                <circle cx="30" cy="22" r="2.5" fill="#ff1493"/>
                                <circle cx="22" cy="18" r="2.5" fill="#ff1493"/>
                                <circle cx="28" cy="18" r="2.5" fill="#ff1493"/>
                            </g>
                            <g id="flower-tr" transform="translate(150,0)">
                                <circle cx="25" cy="25" r="3" fill="#ff69b4"/>
                                <circle cx="20" cy="22" r="2.5" fill="#ff1493"/>
                                <circle cx="30" cy="22" r="2.5" fill="#ff1493"/>
                                <circle cx="22" cy="18" r="2.5" fill="#ff1493"/>
                                <circle cx="28" cy="18" r="2.5" fill="#ff1493"/>
                            </g>
                            
                            <!-- Busto simplificado de Benito Juárez -->
                            <ellipse cx="100" cy="75" rx="22" ry="25" fill="#8b7355"/>
                            <ellipse cx="100" cy="60" rx="18" ry="20" fill="#a0826d"/>
                            <!-- Cabello -->
                            <path d="M82,60 Q82,40 100,35 Q118,40 118,60" fill="#5d4037"/>
                            <!-- Rostro -->
                            <ellipse cx="100" cy="65" rx="14" ry="16" fill="#c19a6b"/>
                            <!-- Ojos -->
                            <circle cx="95" cy="62" r="1.5" fill="#1b1b1b"/>
                            <circle cx="105" cy="62" r="1.5" fill="#1b1b1b"/>
                            <!-- Frente profunda (característica) -->
                            <path d="M100,50 L95,58 L105,58" fill="#a0826d" opacity="0.3"/>
                            
                            <!-- Laureles a los lados -->
                            <g id="laurel-left">
                                <path d="M40,100 Q35,95 32,85 Q30,75 32,65" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round"/>
                                <ellipse cx="38" cy="98" rx="2" ry="3.5" fill="#4caf50"/>
                                <ellipse cx="35" cy="88" rx="2" ry="3.5" fill="#4caf50"/>
                                <ellipse cx="33" cy="78" rx="2" ry="3.5" fill="#4caf50"/>
                                <ellipse cx="33" cy="68" rx="2" ry="3.5" fill="#4caf50"/>
                            </g>
                            <g id="laurel-right">
                                <path d="M160,100 Q165,95 168,85 Q170,75 168,65" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round"/>
                                <ellipse cx="162" cy="98" rx="2" ry="3.5" fill="#4caf50"/>
                                <ellipse cx="165" cy="88" rx="2" ry="3.5" fill="#4caf50"/>
                                <ellipse cx="167" cy="78" rx="2" ry="3.5" fill="#4caf50"/>
                                <ellipse cx="167" cy="68" rx="2" ry="3.5" fill="#4caf50"/>
                            </g>
                            
                            <!-- Flores inferiores -->
                            <g id="flower-bl">
                                <circle cx="40" cy="170" r="3" fill="#ffb300"/>
                                <circle cx="35" cy="168" r="2.5" fill="#ffa500"/>
                                <circle cx="45" cy="168" r="2.5" fill="#ffa500"/>
                                <circle cx="37" cy="162" r="2.5" fill="#ffa500"/>
                                <circle cx="43" cy="162" r="2.5" fill="#ffa500"/>
                            </g>
                            <g id="flower-br" transform="translate(120,0)">
                                <circle cx="40" cy="170" r="3" fill="#ffb300"/>
                                <circle cx="35" cy="168" r="2.5" fill="#ffa500"/>
                                <circle cx="45" cy="168" r="2.5" fill="#ffa500"/>
                                <circle cx="37" cy="162" r="2.5" fill="#ffa500"/>
                                <circle cx="43" cy="162" r="2.5" fill="#ffa500"/>
                            </g>
                            
                            <!-- Estrella superior (5 puntas mexicana) -->
                            <g id="star-top" transform="translate(100,20)">
                                <path d="M0,-8 L2.4,-2.4 L8,-0.8 L3.2,3.2 L4.8,9.2 L0,5.6 L-4.8,9.2 L-3.2,3.2 L-8,-0.8 L-2.4,-2.4 Z" fill="#ffd700" opacity="0.9"/>
                            </g>
                        </svg>
                    </div>
                </div>
            </div>
            <div class="loader-text">
                <div class="sinergia-loader-logo" role="img" aria-label="Logo Sinergia REA">
                    <div class="logo-wordmark">
                        <span class="logo-script">Sinergia</span>
                        <span class="logo-rea">
                            <span class="logo-r">R</span><span class="logo-e">E</span><span class="logo-a">A</span>
                        </span>
                    </div>
                    <div class="logo-tech" aria-hidden="true">
                        <span></span><span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                </div><br>
                <span class="loader-text-animate">Marzo</span><br>
                <span class="loader-text-secondary">Benito Juárez & Primavera</span>
            </div>
            <p class="loader-subtext">🌸 Celebrando la libertad y el renacimiento 🌿</p>
        </div>
    </div>

    <script src="assets/loader.js" defer></script>
</body>
</html>
