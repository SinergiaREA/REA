<svg width="2000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="120" />
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020813" />
      <stop offset="100%" stop-color="#0a1930" />
    </linearGradient>
  </defs>
  <rect width="2000" height="1000" fill="url(#bg)" />
  <g filter="url(#blur)">
    <!-- Azul Sinergia -->
    <circle cx="200" cy="200" r="600" fill="#0057FF" opacity="0.6"/>
    <!-- Magenta Sinergia -->
    <circle cx="1800" cy="800" r="700" fill="#e9009b" opacity="0.5"/>
    <!-- Morado Sinergia -->
    <circle cx="1200" cy="100" r="500" fill="#7B2FBE" opacity="0.7"/>
    <!-- Verde Sinergia -->
    <circle cx="400" cy="900" r="450" fill="#00C875" opacity="0.4"/>
    <!-- Cian destello central -->
    <circle cx="1000" cy="500" r="300" fill="#00E5FF" opacity="0.4"/>
  </g>
  <!-- Patrón de puntos sutil para dar textura y mejorar la percepción del parallax -->
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" fill-opacity="0.12" />
    </pattern>
  </defs>
  <rect width="2000" height="1000" fill="url(#dots)" />
</svg>
